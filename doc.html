<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>文档 · StartUPCAMP SYS</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    :root{
      --blue:#1467df;--navy:#102d5d;--ink:#172b4d;--muted:#667a9b;
      --line:#dce7f6;--bg:#f5f9ff;--code-bg:#f3f6fb;--code-ink:#0e2a52;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--ink);background:var(--bg);line-height:1.7;
    }
    a{color:#075eea;text-decoration:none}
    a:hover{text-decoration:underline}
    button{font:inherit}

    /* 顶栏：复用 index.html 的视觉 */
    header{
      height:74px;background:var(--blue);color:#fff;
      display:flex;align-items:center;padding:0 34px;gap:16px;
      position:sticky;top:0;z-index:10;box-shadow:0 2px 12px #093a8530;
    }
    header .mark{
      width:38px;height:38px;border:2px solid #fff;border-radius:12px;
      display:grid;place-items:center;font-size:21px;
    }
    header .brand{font-size:21px;font-weight:800;letter-spacing:.2px}
    header .brand small{display:block;font-size:12px;font-weight:500;opacity:.88;margin-top:2px}
    header .header-note{margin-left:auto;font-size:14px;opacity:.9}
    header .back{
      margin-left:14px;background:rgba(255,255,255,.16);
      color:#fff;border:1px solid rgba(255,255,255,.45);
      border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;
    }
    header .back:hover{background:rgba(255,255,255,.28)}

    /* 主体布局：左目录 + 右内容 */
    .shell{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 74px)}
    aside.toc{
      background:#fff;border-right:1px solid var(--line);
      padding:22px 18px;position:sticky;top:74px;
      height:calc(100vh - 74px);overflow:auto;
    }
    aside.toc h3{
      margin:0 6px 12px;font-size:13px;color:var(--muted);
      letter-spacing:.5px;text-transform:uppercase;
    }
    aside.toc .doc-meta{
      padding:12px 14px;border:1px solid var(--line);
      border-radius:10px;background:#fafcff;margin-bottom:18px;
    }
    aside.toc .doc-meta b{color:var(--navy);font-size:14px}
    aside.toc .doc-meta p{margin:6px 0 0;font-size:12px;color:var(--muted);line-height:1.5}
    aside.toc ol{padding-left:20px;margin:0;counter-reset:item}
    aside.toc li{
      font-size:13.5px;line-height:1.7;margin:4px 0;
      color:#27416d;cursor:pointer;border-radius:6px;
      padding:2px 6px;
    }
    aside.toc li:hover{background:#eaf3ff;color:#075eea}
    aside.toc li.sub{padding-left:18px;color:#5b7297;font-size:13px}
    aside.toc li.active{background:#eaf3ff;color:#075eea;font-weight:700}

    main{padding:36px 48px 96px;max-width:1080px;width:100%;margin:0 auto}
    .crumb{font-size:13px;color:var(--muted);margin-bottom:14px}
    .crumb a{color:var(--muted)}
    .doc-title{color:var(--navy);font-size:30px;letter-spacing:-.7px;margin:0 0 8px}
    .doc-desc{color:var(--muted);margin:0 0 28px;font-size:14px}
    .toolbar{
      display:flex;gap:10px;justify-content:flex-end;margin-bottom:18px;
    }
    .toolbar button{
      border:1px solid #b9d0f5;background:#fff;color:#075eea;
      border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;
    }
    .toolbar button:hover{background:#f7fbff}

    /* Markdown 内容样式 */
    .doc{
      background:#fff;border:1px solid var(--line);border-radius:14px;
      padding:34px 44px;box-shadow:0 5px 18px #173f7508;
    }
    .doc h1{
      font-size:26px;color:var(--navy);margin:0 0 16px;
      padding-bottom:12px;border-bottom:2px solid var(--line);
    }
    .doc h2{
      font-size:21px;color:var(--navy);
      margin:34px 0 12px;padding-left:12px;border-left:4px solid var(--blue);
    }
    .doc h3{font-size:17px;color:#1c3d6e;margin:24px 0 10px}
    .doc h4{font-size:15px;color:#27416d;margin:20px 0 8px}
    .doc p{margin:10px 0}
    .doc ul,.doc ol{margin:10px 0;padding-left:24px}
    .doc li{margin:5px 0}
    .doc blockquote{
      margin:14px 0;padding:12px 16px;background:#f3f7ff;
      border-left:4px solid #9fc2f5;border-radius:0 8px 8px 0;
      color:#3a5687;font-size:14px;
    }
    .doc blockquote p{margin:4px 0}
    .doc table{
      border-collapse:collapse;width:100%;font-size:13.5px;
      margin:14px 0;display:block;overflow-x:auto;
    }
    .doc th,.doc td{
      border:1px solid var(--line);padding:9px 12px;text-align:left;
      vertical-align:top;min-width:80px;
    }
    .doc th{background:#eef6ff;color:#31517e;font-weight:800}
    .doc tbody tr:hover{background:#f9fcff}
    .doc code{
      background:var(--code-bg);color:var(--code-ink);
      padding:1px 6px;border-radius:4px;font-family:"SF Mono",Consolas,Menlo,monospace;
      font-size:12.5px;
    }
    .doc pre{
      background:var(--code-bg);color:var(--code-ink);
      padding:14px 16px;border-radius:8px;overflow:auto;
      font-size:12.5px;line-height:1.55;
      border:1px solid var(--line);
    }
    .doc pre code{background:transparent;padding:0}
    .doc hr{border:0;border-top:1px solid var(--line);margin:24px 0}
    .doc a{color:#075eea}
    .doc strong{color:#0e2a52}

    /* 加载 / 错误态 */
    .state{
      padding:60px 30px;text-align:center;color:var(--muted);
      background:#fff;border:1px solid var(--line);border-radius:14px;
    }
    .state .icon{font-size:38px;margin-bottom:10px}

    /* 回到顶部按钮 */
    .to-top{
      position:fixed;right:28px;bottom:28px;
      width:42px;height:42px;border-radius:50%;
      background:var(--blue);color:#fff;display:none;
      align-items:center;justify-content:center;cursor:pointer;
      box-shadow:0 6px 20px #0e3f8a40;border:0;font-size:18px;
    }
    .to-top.show{display:flex}

    /* 移动端 */
    @media(max-width:960px){
      .shell{grid-template-columns:1fr}
      aside.toc{
        position:static;height:auto;max-height:60vh;order:2;
        border-right:0;border-top:1px solid var(--line);
      }
      main{padding:24px 18px 60px;order:1}
      .doc{padding:22px 18px}
      header{padding:0 16px}
      header .header-note{display:none}
    }
  </style>
</head>
<body>
<header>
  <div class="mark">↗</div>
  <div class="brand">StartUPCAMP SYS<small>少年马斯克创业营系统</small></div>
  <div class="header-note">文档中心</div>
  <button class="back" onclick="location.href='index.html'">← 返回项目中枢</button>
</header>

<div class="shell">
  <aside class="toc">
    <h3>本文档大纲</h3>
    <div class="doc-meta" id="docMeta">
      <b id="metaTitle">加载中…</b>
      <p id="metaDesc">正在从 docs/ 读取 Markdown 原文</p>
    </div>
    <ol id="tocList"></ol>
  </aside>
  <main>
    <div class="crumb"><a href="index.html">项目中枢</a> / <a href="index.html#docs">产品资料</a> / <span id="crumbName">文档</span></div>
    <h1 class="doc-title" id="pageTitle">文档</h1>
    <p class="doc-desc" id="pageDesc"></p>
    <div class="toolbar">
      <button onclick="window.print()">🖨 打印 / 导出 PDF</button>
      <button onclick="copyRaw()">📋 复制原文</button>
    </div>
    <div id="state" class="state">
      <div class="icon">⏳</div>
      <div>正在加载文档…</div>
    </div>
    <article class="doc" id="docBody" hidden></article>
  </main>
</div>

<button class="to-top" id="toTop" title="回到顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
  // 文档清单：与 index.html 同步
  const DOCS = {
  '少年马斯克创业营系统-终极产品文档.md': {
      title: '产品终极文档',
      desc: '系统范围、角色、流程与功能基线'
    },
    '少年马斯克创业营-后台管理需求与原型索引.md': {
      title: '后台管理需求与原型索引',
      desc: 'V1.1 后台 20 项需求、原型覆盖与待补页面'
    },
    '少年马斯克创业营-V1.0基础方案落地产品需求说明.md': {
      title: 'V1.0 基础方案落地产品需求说明',
      desc: '页面结构、权限规则、功能映射'
    },
    '少年马斯克创业营-V1.1优化营地运营需求说明.md': {
      title: 'V1.1 优化营地运营需求说明',
      desc: 'V1.1 模块拆解与验收口径'
    },
    '少年马斯克创业营-需求池.md': {
      title: '需求池与版本排期',
      desc: '32 条需求、路线图、维护规则'
    },
    '少年马斯克创业营系统-关键规则确认.md': {
      title: '关键规则确认',
      desc: '业务边界、数据与权限约束'
    },
    '少年马斯克创业营-营地记录表设计方案.md': {
      title: '营地记录表设计方案',
      desc: '老师记录与成长证据采集方案'
    },
    '少年马斯克创业营-产品需求四视角梳理.md': {
      title: '产品需求四视角梳理',
      desc: '用户/业务/数据/风险 四个角度'
    }
  };

  // 解析 URL 参数
  const params = new URLSearchParams(location.search);
  const rawFile = params.get('file') || '少年马斯克创业营系统-终极产品文档.md';
  const file = decodeURIComponent(rawFile);
  const meta = DOCS[file] || { title: file, desc: 'Markdown 原文' };

  document.title = meta.title + ' · StartUPCAMP SYS';
  document.getElementById('metaTitle').textContent = meta.title;
  document.getElementById('metaDesc').textContent = meta.desc;
  document.getElementById('crumbName').textContent = meta.title;
  document.getElementById('pageTitle').textContent = meta.title;
  document.getElementById('pageDesc').textContent = meta.desc;

  let rawMarkdown = '';

  // 配置 marked：开启 GFM 表格、换行、任务列表
  marked.setOptions({
    gfm: true, breaks: false, tables: true,
    headerIds: true, mangle: false
  });

  // 加载 Markdown
  fetch('docs/' + encodeURIComponent(file))
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(md => {
      rawMarkdown = md;
      const html = marked.parse(md);
      document.getElementById('docBody').innerHTML = html;
      document.getElementById('docBody').hidden = false;
      document.getElementById('state').hidden = true;
      buildTOC();
      bindAnchorScroll();
    })
    .catch(err => {
      document.getElementById('state').innerHTML =
        '<div class="icon">⚠️</div>' +
        '<div><b>无法加载文档</b></div>' +
        '<div style="margin-top:8px;font-size:13px">文件：' + file + '<br>原因：' + err.message + '</div>' +
        '<div style="margin-top:18px"><a href="index.html">← 返回项目中枢</a></div>';
    });

  // 构建侧边目录
  function buildTOC(){
    const headers = document.querySelectorAll('#docBody h1, #docBody h2, #docBody h3');
    const list = document.getElementById('tocList');
    list.innerHTML = '';
    headers.forEach((h, i) => {
      const id = 'h-' + i;
      h.id = id;
      const li = document.createElement('li');
      if (h.tagName === 'H3') li.classList.add('sub');
      li.textContent = h.textContent.replace(/^#+\s*/, '');
      li.onclick = () => {
        document.getElementById(id).scrollIntoView({behavior:'smooth', block:'start'});
      };
      list.appendChild(li);
    });
    // 滚动监听高亮当前章节
    const tocItems = list.querySelectorAll('li');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          tocItems.forEach(x => x.classList.remove('active'));
          const idx = Array.from(headers).indexOf(en.target);
          if (idx >= 0 && tocItems[idx]) tocItems[idx].classList.add('active');
        }
      });
    }, {rootMargin: '-30% 0px -60% 0px'});
    headers.forEach(h => observer.observe(h));
  }

  // 平滑滚动到锚点
  function bindAnchorScroll(){
    document.querySelectorAll('#docBody a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const id = a.getAttribute('href').slice(1);
        const target = document.getElementById(id);
        if (target) { e.preventDefault(); target.scrollIntoView({behavior:'smooth'}); }
      });
    });
  }

  // 复制原文
  function copyRaw(){
    if (!rawMarkdown) return;
    navigator.clipboard.writeText(rawMarkdown).then(
      () => alert('原文已复制到剪贴板'),
      () => alert('复制失败，请手动选择')
    );
  }

  // 回到顶部
  const toTop = document.getElementById('toTop');
  window.addEventListener('scroll', () => {
    toTop.classList.toggle('show', window.scrollY > 400);
  });
</script>
</body>
</html>
